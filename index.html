<title>AACUniverse - Project Gallery</title>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

<style>

    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif; 
        background-color: #000000; 
        width: 100%;
        scroll-behavior: smooth;
    }

   
    header {
        width: 100%;
        height: 40px;
        background-color: #2C524B;
        border-bottom: 1px solid #2C524B;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .logo {
        color: #B5BCF3 !important;
    	font-weight: bold;
        margin-left: 20px;
        letter-spacing: 1px;
        text-decoration: none;
        font-size: 15px;
        //text-transform: uppercase;
    }

    nav { margin-right: 15px; }
    nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
    nav ul li { margin-left: 50px; }
    nav ul li a {
        color: #FFF4EA;
        text-decoration: none;
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 2px;
        transition: all 0.3s linear;
    }
    nav ul li a:hover { color: #2C9AB7; }

    
    .aac-gallery {
        display: flex;
        flex-direction: column;
        width: 100%;
    }

   
    .aac-gallery img {
        width: 100%;
        height: auto;
        display: block;
        margin: 0;
        padding: 0;
        border: none;
    }

    
    .video-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; 
        height: 0;
        overflow: hidden;
        background-color: #000;
    }

    .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }


    #about {
        scroll-margin-top: 0px;
        width: 100%;
    }
	
	#about img {
    width: 100%;
    height: auto;
    display: block;
}
	
    .copyright {
        text-align: center;
        padding: 10px 0;
        background-color: #7eacb5;
        color: #FFFFFF;
        //text-transform: uppercase;
        font-weight: lighter;
        letter-spacing: 1px;
        font-size: 8px;
    }
</style>
</head>

    <header> 
        <a href="#aac" class="logo">AACUniverse</a>
