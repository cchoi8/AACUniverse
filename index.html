<!doctype html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to AACUniverse!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000000;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            height: 23px;
            background-color: #2C524B;
            border-bottom: 1px solid #2C524B;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: #B5BCF3 !important;
            font-weight: bold;
            margin-left: 20px;
            letter-spacing: 0px;
            text-decoration: none;
            font-size: 20px;
        }

        nav { margin-right: 10px; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav ul li { margin-left: 25px; }
        nav ul li a {
            color: #F1FF5E;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0px;
            transition: all 0.3s linear;
        }
        nav ul li a:hover { color: #2C9AB7; }
		
.scroll-indicator {
    position: absolute;
    top: 54%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #F1FF5E;
    z-index: 10;
    animation: combined-bounce 8s infinite ease-in-out; 
}

.scroll-indicator span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 0px;
    margin-bottom: 1px;
    text-shadow: 0 0 50px rgba(0,0,0,1);
}

.arrow {
    width: 30px;
    height: 30px;
    border-right: 5px solid #F1FF5E;
    border-bottom: 5px solid #F1FF5E;
    transform: rotate(45deg);
    margin: 0 auto;
}

@keyframes combined-bounce {
    0% { transform: translate(-50%, -80%); }
    30% { transform: translate(-50%, -15%); } 
    80% { transform: translate(-50%, -80%); } 
    100% { transform: translate(-50%, -80%); }
}
        	
        .aac-gallery {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .aac-gallery img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        #aac, #home, #video, #about {
            scroll-margin-top: -55px;
            width: 100%;
        }

        .copyright {
            text-align: center;
            padding: 30px 0;
            background-color: #7eacb5;
            color: #FFFFFF;
            letter-spacing: 1px;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>
